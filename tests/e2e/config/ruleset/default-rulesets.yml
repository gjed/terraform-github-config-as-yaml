# Ruleset templates for the e2e fixture.
# The module reads this file as the source of ruleset templates.
# Any ruleset defined here can be referenced as `template: <name>` in
# groups or repositories.

e2e-strict-template:
  target: branch
  enforcement: active
  conditions:
    ref_name:
      include:
        - "~DEFAULT_BRANCH"
      exclude: []
  rules:
    - type: deletion
    - type: non_fast_forward
    - type: required_linear_history
    - type: pull_request
      parameters:
        required_approving_review_count: 2
        dismiss_stale_reviews_on_push: true
        require_code_owner_review: true
        require_last_push_approval: false
        required_review_thread_resolution: false
