# Default Repository Rulesets and Templates
# Define reusable rulesets that can be applied to config groups or individual repositories
#
# Rulesets can be:
# 1. Applied directly by reference (e.g., rulesets: [oss-main-protection])
# 2. Used as templates with the 'template' key (e.g., template: strict-main)
#
# ORGANIZATION-LEVEL RULESETS
# Add 'scope: organization' to create a github_organization_ruleset instead of a
# per-repository ruleset. Org rulesets apply across repositories based on
# repository_name conditions. They require a 'team' or 'enterprise' subscription.
#
# Org rulesets CANNOT be referenced via 'rulesets:' in groups or repositories —
# they are applied globally and filtered only by repository_name conditions.
#
# Example org ruleset (uncomment to enable):
#
# org-main-protection:
#   scope: organization          # Required: marks this as an org-level ruleset
#   target: branch
#   enforcement: active
#   conditions:
#     ref_name:
#       include:
#         - "~DEFAULT_BRANCH"
#       exclude: []
#     repository_name:           # Optional: which repos this applies to (default: all)
#       include:
#         - "*"
#       exclude:
#         - "sandbox-*"
#         - "test-*"
#   bypass_actors:
#     - actor_type: RepositoryRole
#       actor_id: 5              # Admin role
#       bypass_mode: always
#   rules:
#     - type: deletion
#     - type: non_fast_forward
#     - type: pull_request
#       parameters:
#         required_approving_review_count: 1
#         dismiss_stale_reviews_on_push: true
#
# When using templates in repositories.yml or groups.yml:
#   rulesets:
#     - template: strict-main
#     - template: relaxed-devel
#       # Override template settings (optional)
#       rules:
#         - type: pull_request
#           parameters:
#             required_approving_review_count: 2
#
# Supported rule types:
# - deletion: Prevent branch/tag deletion
# - non_fast_forward: Prevent force pushes
# - required_linear_history: Require linear history
# - required_signatures: Require signed commits
# - pull_request: Require pull request reviews
# - required_status_checks: Require CI checks to pass
# - creation: Control branch creation
# - update: Control branch updates
# - commit_message_pattern: Enforce commit message patterns
# - branch_name_pattern: Enforce branch naming patterns

# ============================================================================
# TEMPLATE RULESETS
# Pre-built configurations that can be referenced by name in repository configs
# ============================================================================

# Strict main branch protection
# Enforces 2 required approvals, code owner review, and linear history
strict-main:
  target: branch
  enforcement: active
  conditions:
    ref_name:
      include:
        - "~DEFAULT_BRANCH"
      exclude: []
  rules:
    - type: deletion
    - type: non_fast_forward
    - type: required_linear_history
    - type: pull_request
      parameters:
        required_approving_review_count: 2
        dismiss_stale_reviews_on_push: true
        require_code_owner_review: true
        require_last_push_approval: false

# Relaxed devel branch protection
# Enforces 1 required approval for devel branch
relaxed-devel:
  target: branch
  enforcement: active
  conditions:
    ref_name:
      include:
        - "refs/heads/devel"
      exclude: []
  rules:
    - type: deletion
    - type: non_fast_forward
    - type: pull_request
      parameters:
        required_approving_review_count: 1
        dismiss_stale_reviews_on_push: true
        require_code_owner_review: false
        require_last_push_approval: false

# ============================================================================
# DEFAULT RULESETS
# Standard rulesets for common repository configurations
# ============================================================================

# Main branch protection for open source repositories
# Basic protection requiring 1 approval and linear history
oss-main-protection:
  target: branch
  enforcement: active
  conditions:
    ref_name:
      include:
        - "~DEFAULT_BRANCH"
      exclude: []
  rules:
    - type: deletion
    - type: non_fast_forward
    - type: required_linear_history
    - type: pull_request
      parameters:
        required_approving_review_count: 1
        dismiss_stale_reviews_on_push: true
        require_code_owner_review: false
        require_last_push_approval: false

# Main branch protection for OSS with maintainer bypass
# Allows repository maintainers and admins to bypass branch protection
# Suitable for open source projects where maintainers need flexibility
oss-main-bypass:
  target: branch
  enforcement: active
  bypass_actors:
    - actor_type: RepositoryRole
      actor_id: 2  # Maintain role
      bypass_mode: always
    - actor_type: RepositoryRole
      actor_id: 5  # Admin role
      bypass_mode: always
  conditions:
    ref_name:
      include:
        - "~DEFAULT_BRANCH"
      exclude: []
  rules:
    - type: deletion
    - type: non_fast_forward
    - type: required_linear_history
    - type: required_signatures
    - type: pull_request
      parameters:
        required_approving_review_count: 1
        dismiss_stale_reviews_on_push: true
        require_code_owner_review: true
        require_last_push_approval: false

# Main branch protection for internal repositories
# Requires paid GitHub plan for private repositories
internal-main-protection:
  target: branch
  enforcement: active
  conditions:
    ref_name:
      include:
        - "~DEFAULT_BRANCH"
      exclude: []
  rules:
    - type: deletion
    - type: non_fast_forward
    - type: required_linear_history

# Release branch protection (example for release branches)
release-branch-protection:
  target: branch
  enforcement: active
  conditions:
    ref_name:
      include:
        - "refs/heads/release/*"
        - "refs/heads/v*"
      exclude: []
  rules:
    - type: deletion
    - type: non_fast_forward
    - type: required_linear_history
    - type: pull_request
      parameters:
        required_approving_review_count: 2
        dismiss_stale_reviews_on_push: true
        require_code_owner_review: true
        require_last_push_approval: true

# Development branch protection (example for feature branches)
dev-branch-protection:
  target: branch
  enforcement: evaluate  # Evaluate mode - warns but doesn't block
  conditions:
    ref_name:
      include:
        - "refs/heads/dev/*"
        - "refs/heads/feature/*"
      exclude: []
  rules:
    - type: non_fast_forward

# Tag protection (example to prevent tag deletion)
tag-protection:
  target: tag
  enforcement: active
  conditions:
    ref_name:
      include:
        - "refs/tags/v*"
      exclude: []
  rules:
    - type: deletion
    - type: update

# Commit message convention enforcement (example)
commit-message-convention:
  target: branch
  enforcement: active
  conditions:
    ref_name:
      include:
        - "~DEFAULT_BRANCH"
      exclude: []
  rules:
    - type: commit_message_pattern
      parameters:
        operator: regex
        pattern: "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore)(\\(.+\\))?!?: .+"
        name: "Conventional Commits"
        negate: false

# Required status checks (example)
require-ci-checks:
  target: branch
  enforcement: active
  conditions:
    ref_name:
      include:
        - "~DEFAULT_BRANCH"
      exclude: []
  rules:
    - type: required_status_checks
      parameters:
        required_checks:
          - context: "ci/build"
          - context: "ci/test"
        strict_required_status_checks_policy: true
