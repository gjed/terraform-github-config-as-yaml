# Common Configuration
# Organization-level settings and global defaults

# GitHub organization or username
# Replace with your organization name or GitHub username
organization: your-org-name

# GitHub subscription tier
# Options: free, pro, team, enterprise
# This affects which features are available:
# - free: Rulesets only work on public repositories
# - pro: Rulesets work on public and private repositories (personal accounts only)
# - team: Full ruleset support including push rulesets for private/internal repos
# - enterprise: Full feature set
subscription: free

# Default repository settings (applied before groups)
# These serve as fallback values when not specified in groups or repositories
defaults:
  visibility: private
  has_wiki: false
  has_issues: false
  has_projects: false
  has_discussions: false
  allow_merge_commit: true
  allow_squash_merge: true
  allow_rebase_merge: true
  allow_auto_merge: false
  allow_update_branch: false
  delete_branch_on_merge: false
  web_commit_signoff_required: false
  vulnerability_alerts: true

# Organization-level settings (optional)
# Uncomment and configure to manage GitHub organization settings via Terraform.
# Only takes effect when is_organization: true (the default).
# billing_email is required by the GitHub provider when this block is enabled.
#
# ⚠️  DANGER: two_factor_requirement: true immediately removes ALL members without 2FA enabled.
#
# settings:
#   # Required when settings block is enabled
#   billing_email: org-billing@example.com
#
#   # Profile
#   company: "Your Company"
#   blog: "https://example.com"
#   email: "contact@example.com"
#   location: "Earth"
#   description: "Your organization description"
#
#   # Member privileges
#   default_repository_permission: read   # none, read, write, admin
#   members_can_create_repositories: true
#   members_can_create_public_repositories: true
#   members_can_create_private_repositories: true
#   members_can_fork_private_repositories: false
#   web_commit_signoff_required: false
#
#   # ⚠️  WARNING: Enabling this removes members without 2FA immediately
#   # two_factor_requirement: false
#
#   # Dependabot / dependency graph (all subscription tiers)
#   dependabot_alerts_enabled_for_new_repositories: false
#   dependabot_security_updates_enabled_for_new_repositories: false
#   dependency_graph_enabled_for_new_repositories: false
#
#   # GHAS / Enterprise-only settings (subscription: enterprise required)
#   # These are silently skipped with a warning on non-enterprise tiers.
#   advanced_security_enabled_for_new_repositories: false
#   secret_scanning_enabled_for_new_repositories: false
#   secret_scanning_push_protection_enabled_for_new_repositories: false
#   members_can_create_internal_repositories: false
# Organization-level webhooks (optional)
# Org webhooks fire for events across ALL repositories in the organization.
# Webhooks must be defined in config/webhook/ and referenced here by name.
# Only applicable for organizations (not personal accounts).
#
# org_webhooks:
#   - audit-logger    # Must be defined in config/webhook/
#   - ci-notifier

# Organization-level GitHub Actions configuration (optional)
# Uncomment and configure to manage Actions permissions at the organization level
# These settings act as a policy ceiling - repositories cannot exceed org permissions
#
# actions:
#   # Which repositories can use Actions: all, none, selected
#   enabled_repositories: all
#
#   # Which actions are allowed to run: all, local_only, selected
#   # - all: Any action can be used
#   # - local_only: Only actions defined in the repository
#   # - selected: Only actions matching the allowed_actions_config
#   allowed_actions: selected
#
#   # Configuration when allowed_actions is "selected"
#   allowed_actions_config:
#     github_owned_allowed: true      # Allow actions in github/* namespace
#     verified_allowed: true          # Allow marketplace verified creators
#     patterns_allowed:               # Explicit patterns to allow
#       - "actions/*"
#       - "your-org/*"
#
#   # Default GITHUB_TOKEN permissions for workflows: read, write
#   # Secure default: read (principle of least privilege)
#   default_workflow_permissions: read
#
#   # Whether Actions can approve pull request reviews
#   # Secure default: false
#   can_approve_pull_request_reviews: false
